<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | Fausto Luís</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/repo-actions.css">
    <link class="nav" rel="stylesheet" href="../styles/profile.css">
</head>

<body>

    <!-- TOPBAR -->
    <header class="topbar">

        <div class="brand">
            <a href="/" aria-label="Home">🚀 My Portfolio</a>
        </div>

        <nav class="nav">
            <!-- Home link removed as requested -->
        </nav>

    </header>

    <!-- PROFILE HERO -->
    <header class="hero">

        <div class="container">

            <img class="avatar" src="../assets/images/MyPhoto.jpg" alt="Fausto Luís avatar">

            <h1 id="name"></h1>

            <p id="bio"></p>
        </div>

    </header>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.body.classList.add("dark");
            }
        })();
    </script>
    <script>
        const CACHE_DURATION = 6 * 60 * 60 * 1000;
        function getCache(key) {
            try {
                const cached = localStorage.getItem(key);
                if (!cached) return null;
                const { value, expires } = JSON.parse(cached);
                if (Date.now() > expires) {
                    localStorage.removeItem(key);
                    return null;
                }
                return value;
            } catch { return null; }
        }
        function setCache(key, value) {
            localStorage.setItem(key, JSON.stringify({ value, expires: Date.now() + CACHE_DURATION }));
        }
        async function fetchWithCache(url, options = {}) {
            const cacheKey = `cache::${url}`;
            const cached = getCache(cacheKey);
            if (cached) return cached;
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(`Failed to fetch: ${url}`);
            const data = await res.json();
            setCache(cacheKey, data);
            return data;
        }
        async function loadProfile() {
            try {
                const url = "https://api.github.com/users/fauxtix";
                const data = await fetchWithCache(url);

                document.getElementById("name").textContent = data.name || data.login;
                document.getElementById("bio").textContent = data.bio || "No Bio available";

                document.querySelector(".avatar").src = data.avatar_url;

            } catch (e) {
                console.error("Error while loading profile:", e);
            }
        }

        loadProfile();
    </script>
</body>

</html>
