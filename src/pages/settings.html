<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | GitHub Insights</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/repo-actions.css">
    <link rel="stylesheet" href="../styles/settings.css"><!-- <-- ADD THIS LINE -->
    <script src="../scripts/theme.js"></script>
</head>

<body>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.body.classList.add("dark");
            }
        })();
    </script>
    <!-- TOPBAR -->
    <header class="topbar">
        <div class="brand">
            <a href="/" aria-label="Home">🚀 My Portfolio</a>
        </div>
        <nav class="nav">
        </nav>
    </header>
    <div class="page-container">
        <h1 class="page-title">Settings</h1>
        <form id="settingsForm" class="contact-form" autocomplete="off">
            <label for="githubUser">GitHub Username</label>
            <input type="text" id="githubUser" name="githubUser" required>

            <label for="contactEmail">Contact Email</label>
            <input type="email" id="contactEmail" name="contactEmail" required>

            <label for="cacheDuration">Cache Duration (hours)</label>
            <input type="number" id="cacheDuration" name="cacheDuration" min="1" max="48" required>

            <hr style="margin:24px 0 18px 0;opacity:.3">

            <fieldset class="socials-group">
                <legend>Social links</legend>
                <div class="socials-grid">
                    <div>
                        <label for="linkedin">LinkedIn</label>
                        <input id="linkedin" name="social_linkedin" type="url"
                            placeholder="https://linkedin.com/in/your-profile">
                    </div>
                    <div>
                        <label for="twitter">Twitter</label>
                        <input id="twitter" name="social_twitter" type="url"
                            placeholder="https://twitter.com/your-handle">
                    </div>
                    <div>
                        <label for="website">Website</label>
                        <input id="website" name="social_website" type="url" placeholder="https://yourwebsite.com">
                    </div>
                    <div>
                        <label for="blog">Blog</label>
                        <input id="blog" name="social_blog" type="url" placeholder="https://yourblog.com">
                    </div>
                    <div>
                        <label for="instagram">Instagram</label>
                        <input id="instagram" name="social_instagram" type="url"
                            placeholder="https://instagram.com/your-handle">
                    </div>
                </div>
            </fieldset>
            <button type="submit" class="primary-btn">Save Settings</button>
        </form>
        <button type="button" id="resetBtn" class="secondary-btn" style="margin-top:12px;">Reset to Defaults</button>
        <div id="settingsMsg" style="margin-top:18px;color:#16a34a;"></div>
        <p class="contact-hint">Update your GitHub username, contact email, cache duration, or social & contact details.
            Reset to defaults if needed.</p>
    </div>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/settings.js"></script>
</body>

</html>
