<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fausto Luís | Programação / Análise</title>
    <meta name="color-scheme" content="dark light">
    <meta name="description"
        content="Portfolio de Fausto Luís, software engineer especializado em backend, APIs e automação.">
    <meta name="keywords" content="developer, portfolio, github, backend, java, python">
    <meta name="author" content="Fausto Luís">
    <meta property="og:title" content="Fausto Luís Portfolio">
    <meta property="og:description" content="Projects and repositories by Fausto Luís on GitHub">
    <meta property="og:image" content="./src/assets/images/avatar.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Global Styles -->
    <link rel="stylesheet" href="./src/styles/style.css">
    <link rel="stylesheet" href="./src/styles/repo-actions.css">
</head>

<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="brand">
            <a href="index.html">🚀 My Portfolio</a>
        </div>
        <nav class="nav" id="mainNav">
            <div class="nav-center">
                <div class="nav-main">
                    <a href="https://github.com/fauxtix" target="_blank"><span class="emoji">🐙</span> My GitHub</a>
                    <a href="./src/pages/contact.html" class="hover:underline"><img
                            src="./src/assets/images/contact-mail.svg" alt="Contact" class="emoji"
                            style="width:1.35em;height:1.35em;vertical-align:middle;" /> Contact</a>
                </div>
                <div class="nav-utility">
                    <a href="./src/pages/profile.html">
                        <img src="./src/assets/images/profile-avatar.svg" alt="Profile" class="emoji"
                            style="width:1.35em;height:1.35em;vertical-align:middle;" />
                    </a>
                    <a href="./src/pages/download.html" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg
          bg-gray-900 text-white hover:bg-gray-800 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2
             2 0 002-2v-2" />
                        </svg>
                    </a>
                    <a href="./src/pages/settings.html">
                        <img src="./src/assets/images/settings-classic.svg" alt="Settings" class="emoji"
                            style="width:1.35em;height:1.35em;vertical-align:middle;" />
                    </a>
                    <button id="toggleTheme">
                        <img src="./src/assets/images/theme-moon-yellow.svg" alt="Theme" class="emoji"
                            style="width:1.35em;height:1.35em;vertical-align:middle;" />
                    </button>
                    <button id="authBtn"></button>
                </div>
            </div>
        </nav>
        <button class="hamburger" id="hamburgerBtn" aria-label="Open navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <section class="search-options">
        <!-- Left: GitHub user input and button -->
        <div class="search-user">
            <input id="githubUserInput" type="text" aria-label="GitHub User" placeholder="GitHub User" />
            <button id="loadUserBtn"
                style="border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 16px; background: var(--button-bg); color: var(--button-text);">Load
                Repos</button>
        </div>
        <!-- Center: Search bar, clear, filter -->
        <div class="search-center">
            <input type="text" id="searchInput" placeholder="Search projects..." aria-label="Search projects"
                style="min-width:200px;max-width:340px;width:100%;" />
            <button id="clearSearchBtn" title="Clear search" aria-label="Clear search">
                <span aria-hidden="true">✖</span>
            </button>
            <div style="width:220px;">
                <select id="languageFilter" aria-label="Filter by programming language">
                    <option value="all">All Languages</option>
                </select>

            </div>
        </div>
        <!-- Right: empty spacer for true centering -->
        <div class="search-spacer"></div>
    </section>

    <!-- PROFILE (for avatar, name, bio) -->
    <section id="profile" style="display:none;">
        <img id="avatar" src="./src/assets/images/avatar.png" alt="Avatar"
            style="width:100px;height:100px;border-radius:50%;margin:16px auto;display:block;" />
        <h2 id="name" style="text-align:center;"></h2>
        <p id="bio" style="text-align:center;"></p>
    </section>

    <!-- REPOSITORIES -->
    <section id="repos">
        <div id="repoGrid" class="repo-grid"></div>
    </section>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal">✕</button>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="./src/scripts/config.js"></script>
    <!-- <script>
        // Redirect to login if no token
        (function () {
            if (!sessionStorage.getItem('github_token')) {
                window.location.href = './src/pages/login.html';
            }
        })();
    </script> -->
    <script src="./src/scripts/app.js"></script>
</body>

</html>
