<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | GitHub Insights</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
</head>

<body>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.body.classList.add("dark");
            }
        })();
    </script>
    <a href="index.html" class="back-home-link"
        style="position:absolute;top:18px;left:18px;text-decoration:none;color:#007bff;font-weight:500;">&larr; Back to
        Home</a>
    <div class="page-container">
        <h1 class="page-title">Contact</h1>
        <form id="contactForm" class="contact-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit" class="primary-btn">Send</button>
        </form>
        <p class="contact-hint">This form will open your email client to send the message.</p>
    </div>
    <script src="contact.js"></script>
</body>

</html>
